<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" fill="#0d0d0d"/>

  <!-- Outer border dim -->
  <rect x="1" y="1" width="46" height="46" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Main border -->
  <rect x="3" y="3" width="42" height="42" stroke="#00ff41" stroke-width="1.5" fill="none"/>

  <!-- Corner brackets -->
  <path d="M3 10 L3 3 L10 3" stroke="#00ff41" stroke-width="2" fill="none"/>
  <path d="M38 3 L45 3 L45 10" stroke="#00ff41" stroke-width="2" fill="none"/>
  <path d="M3 38 L3 45 L10 45" stroke="#00ff41" stroke-width="2" fill="none"/>
  <path d="M38 45 L45 45 L45 38" stroke="#00ff41" stroke-width="2" fill="none"/>

  <!-- Python snake curves (subtle) -->
  <path d="M11 19 Q17 13 23 19 Q29 25 35 19" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="2 2"/>
  <path d="M11 29 Q17 23 23 29 Q29 35 35 29" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="2 2"/>

  <!-- J — pixel style -->
  <rect x="15" y="13" width="3" height="16" fill="#00ff41" filter="url(#glow)"/>
  <rect x="10" y="25" width="3" height="4" fill="#00ff41" filter="url(#glow)"/>
  <rect x="10" y="29" width="8" height="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- D — pixel style -->
  <rect x="22" y="13" width="3" height="19" fill="#ffffff" filter="url(#glow)"/>
  <rect x="22" y="13" width="9" height="3" fill="#ffffff" filter="url(#glow)"/>
  <rect x="22" y="29" width="9" height="3" fill="#ffffff" filter="url(#glow)"/>
  <rect x="31" y="16" width="3" height="3" fill="#ffffff" filter="url(#glow)"/>
  <rect x="33" y="19" width="3" height="7" fill="#ffffff" filter="url(#glow)"/>
  <rect x="31" y="26" width="3" height="3" fill="#ffffff" filter="url(#glow)"/>

  <!-- Blinking cursor -->
  <rect x="40" y="38" width="3" height="3" fill="#00ff41">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
